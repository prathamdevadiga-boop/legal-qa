<!DOCTYPE html>
<html>
<head>
  <title>Legal Q&A</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: #0f0f1a; color: #eee; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; min-height: 100vh; }
    h1 { font-size: 24px; margin-bottom: 8px; color: #fff; }
    p { color: #888; margin-bottom: 30px; font-size: 14px; }
    .box { width: 100%; max-width: 700px; }
    input { width: 100%; padding: 14px; font-size: 15px; border-radius: 8px; border: 1px solid #333; background: #1a1a2e; color: #fff; margin-bottom: 10px; }
    button { width: 100%; padding: 12px; background: #4f46e5; color: white; border: none; border-radius: 8px; font-size: 15px; cursor: pointer; }
    button:hover { background: #4338ca; }
    #answer { margin-top: 24px; padding: 20px; background: #1a1a2e; border-radius: 8px; border: 1px solid #333; font-size: 15px; line-height: 1.7; min-height: 60px; color: #ddd; }
    .label { font-size: 12px; color: #555; margin-bottom: 6px; }
  </style>
</head>
<body>
  <div class="box">
    <h1>⚖️ Legal Document Q&A</h1>
    <p>Ask questions about the loaded court case</p>
    <input type="text" id="question" placeholder="e.g. What was the accused charged with?"/>
    <button onclick="ask()">Ask</button>
    <div class="label" style="margin-top:20px">Answer</div>
    <div id="answer">Your answer will appear here...</div>
  </div>
  <script>
    async function ask() {
      const q = document.getElementById("question").value;
      if (!q) return;
      document.getElementById("answer").innerText = "Thinking...";
      const res = await fetch("/ask", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({question: q})
      });
      const data = await res.json();
      document.getElementById("answer").innerText = data.answer;
    }
    document.getElementById("question").addEventListener("keypress", function(e) {
      if (e.key === "Enter") ask();
    });
  </script>
</body>
</html>
