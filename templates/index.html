<!DOCTYPE html>
<html>
<head>
  <title>Legal Q&A</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #0a0a0f; color: #eee; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; }
    .container { width: 100%; max-width: 750px; }
    .header { margin-bottom: 32px; }
    .header h1 { font-size: 26px; font-weight: 600; color: #fff; margin-bottom: 6px; }
    .header p { color: #666; font-size: 14px; }
    .badge { display: inline-block; font-size: 11px; padding: 3px 10px; border-radius: 20px; background: #1a1a3e; color: #818cf8; border: 1px solid #2d2d6e; margin-bottom: 16px; }
    .input-row { display: flex; gap: 10px; margin-bottom: 24px; }
    input { flex: 1; padding: 14px 16px; font-size: 15px; border-radius: 10px; border: 1px solid #222; background: #111; color: #fff; outline: none; }
    input:focus { border-color: #4f46e5; }
    button { padding: 14px 24px; background: #4f46e5; color: white; border: none; border-radius: 10px; font-size: 15px; cursor: pointer; white-space: nowrap; }
    button:hover { background: #4338ca; }
    .answer-box { background: #111; border: 1px solid #222; border-radius: 10px; padding: 20px; min-height: 100px; font-size: 15px; line-height: 1.8; color: #ccc; }
    .answer-label { font-size: 11px; color: #444; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 8px; }
    .thinking { color: #4f46e5; font-style: italic; }
    .suggestions { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; }
    .suggestion { font-size: 12px; padding: 6px 12px; border-radius: 20px; border: 1px solid #222; color: #888; cursor: pointer; background: #111; }
    .suggestion:hover { border-color: #4f46e5; color: #818cf8; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <span class="badge">⚖️ Powered by RAG + Ollama</span>
      <h1>Legal Document Q&A</h1>
      <p>Ask questions about loaded Indian court cases</p>
    </div>
    <div class="suggestions">
      <span class="suggestion" onclick="ask('Who is the petitioner in the Kerala High Court case?')">Who is the petitioner?</span>
      <span class="suggestion" onclick="ask('What did the court direct the bank to do?')">Court directions to bank</span>
      <span class="suggestion" onclick="ask('What was the defamation case about?')">Defamation case</span>
      <span class="suggestion" onclick="ask('What is the accused charged with?')">Charges against accused</span>
    </div>
    <div class="input-row">
      <input type="text" id="question" placeholder="Ask a question about the court cases..."/>
      <button onclick="ask()">Ask</button>
    </div>
    <div class="answer-label">Answer</div>
    <div class="answer-box" id="answer">Your answer will appear here...</div>
  </div>
  <script>
    async function ask(prefill) {
      const input = document.getElementById("question");
      if (prefill) input.value = prefill;
      const q = input.value;
      if (!q) return;
      document.getElementById("answer").innerHTML = '<span class="thinking">Thinking...</span>';
      const res = await fetch("/ask", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({question: q})
      });
      const data = await res.json();
      document.getElementById("answer").innerText = data.answer;
    }
    document.getElementById("question").addEventListener("keypress", function(e) {
      if (e.key === "Enter") ask();
    });
  </script>
</body>
</html>
